<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Devines Protocol</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,200px);
gap:30px;
justify-content:center;
margin-top:80px;
}

.circle{
width:200px;
height:200px;
border-radius:50%;
border:2px solid white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:20px;
}

.circle:hover{
background:white;
color:black;
}

</style>

</head>

<body>

<h1>Devines Protocol</h1>

<h3>Select Pantheon</h3>

<div class="grid">

<div class="circle" onclick="openPantheon('greek')">Greek</div>
<div class="circle">Egyptian</div>
<div class="circle">Norse</div>
<div class="circle">Hindu</div>
<div class="circle">Sumerian</div>
<div class="circle">Chinese</div>

</div>

<script>

function openPantheon(name){
window.location.href = name + ".html"
}

</script>

</body>
</html></div>

</div>

<script src="script.js"></script>

</body>

</html>
