<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Devines</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
font-family:Arial;
}

#triangle{
cursor:pointer;
transition:0.5s;
}

#triangle:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<svg width="400" height="400" viewBox="0 0 400 400">

<polygon
id="triangle"
points="200,60 340,300 60,300"
stroke="white"
stroke-width="6"
fill="none"
filter="url(#glow)"
onclick="enterDevines()"
/>

<defs>

<filter id="glow">

<feGaussianBlur stdDeviation="6" result="blur"/>

<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>

</filter>

</defs>

</svg>

<script>

function enterDevines(){
window.location.href="/pantheon.html";
}

</script>

</body>
</html>
