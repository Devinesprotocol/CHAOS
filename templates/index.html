<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Devines</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

svg{
    width:70vmin;
    height:70vmin;
}

#triangle{
    cursor:pointer;
    transition:transform 0.3s ease;
}

#triangle:hover{
    transform:scale(1.04);
}
</style>
</head>

<body>

<svg viewBox="0 0 400 400">

    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <polygon
        id="triangle"
        points="200,60 340,300 60,300"
        stroke="white"
        stroke-width="6"
        fill="none"
        filter="url(#glow)"
        onclick="enterDevines()"
    />

</svg>

<script>
function enterDevines(){
    window.location.href = "/pantheon";
}
</script>

</body>

</html>
