<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Devines Protocol</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
position:relative;
width:700px;
height:700px;
}

/* DEVINES CORE */

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:36px;
letter-spacing:6px;
text-align:center;

text-shadow:
0 0 10px white,
0 0 20px white,
0 0 40px rgba(255,255,255,0.7);
}

/* PANTHEON NODES */

.node{
position:absolute;
width:120px;
height:120px;
border-radius:60px;
border:1px solid white;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:0.3s;
}

.node:hover{
background:white;
color:black;
box-shadow:0 0 20px white;
}

/* POSITIONS */

.n1{top:0;left:290px;}
.n2{top:140px;right:0;}
.n3{bottom:140px;right:0;}
.n4{bottom:0;left:290px;}
.n5{bottom:140px;left:0;}
.n6{top:140px;left:0;}

</style>

</head>

<body>

<div class="container">

<div class="center">
DEVINES
</div>

<div class="node n1" onclick="openPantheon('GREEK')">GREEK</div>
<div class="node n2" onclick="openPantheon('EGYPT')">EGYPT</div>
<div class="node n3" onclick="openPantheon('CHINESE')">CHINESE</div>
<div class="node n4" onclick="openPantheon('VEDIC')">VEDIC</div>
<div class="node n5" onclick="openPantheon('SUMERIAN')">SUMERIAN</div>
<div class="node n6" onclick="openPantheon('NORSE')">NORSE</div>

</div>

<script>

function openPantheon(name){

localStorage.setItem("pantheon",name)

window.location="/pantheon"

}

</script>

</body>
</html>
