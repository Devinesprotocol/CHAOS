<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Greek Pantheon</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
    color:white;
    overflow:hidden;
}

svg{
    width:92vmin;
    height:92vmin;
}

.node{
    cursor:pointer;
}

text{
    fill:white;
    font-size:13px;
    text-anchor:middle;
    dominant-baseline:middle;
    pointer-events:none;
}

line{
    stroke:gold;
    stroke-width:1;
    opacity:0.5;
}

.outerCircle{
    stroke:gold;
    stroke-width:1;
    fill:none;
}

.godCircle{
    stroke:gold;
    stroke-width:1;
    fill:black;
}

.centerCircle{
    stroke:gold;
    stroke-width:2;
    fill:black;
}
</style>
</head>

<body>

<svg viewBox="0 0 800 800">

    <!-- Sacred outer circle -->
    <circle class="outerCircle" cx="400" cy="400" r="320"/>

    <!-- Sacred geometry lines -->
    <line x1="400" y1="80" x2="400" y2="720"/>
    <line x1="80" y1="400" x2="720" y2="400"/>
    <line x1="160" y1="160" x2="640" y2="640"/>
    <line x1="640" y1="160" x2="160" y2="640"/>

    <!-- CENTER CHAOS -->
    <g class="node" onclick="selectEntity('CHAOS')">
        <circle class="centerCircle" cx="400" cy="400" r="55"/>
        <text x="400" y="400">CHAOS</text>
    </g>

    <script>
    const gods = [
        { name:"ZEUS", angle:270 },      // 1 Creator
        { name:"HERA", angle:300 },      // 2 Order
        { name:"ATHENA", angle:330 },    // 3 Knowledge
        { name:"KRONOS", angle:0 },      // 4 Time
        { name:"DEMETER", angle:30 },    // 5 Life
        { name:"HADES", angle:60 },      // 6 Death
        { name:"ARTEMIS", angle:90 },    // 7 Balance
        { name:"ARES", angle:120 },      // 8 Protection
        { name:"DIONYSUS", angle:150 },  // 9 Transformation
        { name:"POSEIDON", angle:180 },  // 10 Power
        { name:"APOLLO", angle:210 },    // 11 Awakening
        { name:"HERMES", angle:240 }     // 12 Transcendence
    ];

    const centerX = 400;
    const centerY = 400;
    const radius = 320;

    const svg = document.querySelector("svg");

    gods.forEach(god => {
        const rad = god.angle * Math.PI / 180;
        const x = centerX + radius * Math.cos(rad);
        const y = centerY + radius * Math.sin(rad);

        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.setAttribute("class", "node");
        group.setAttribute("onclick", "selectEntity('" + god.name + "')");

        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("class", "godCircle");
        circle.setAttribute("cx", x);
        circle.setAttribute("cy", y);
        circle.setAttribute("r", 32);

        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", x);
        text.setAttribute("y", y);
        text.textContent = god.name;

        group.appendChild(circle);
        group.appendChild(text);
        svg.appendChild(group);
    });
    </script>

</svg>

<script src="/static/script.js"></script>

</body>

</html>
