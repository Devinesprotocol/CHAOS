<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Greek Pantheon</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.node{
cursor:pointer;
}

text{
fill:white;
font-size:14px;
text-anchor:middle;
dominant-baseline:middle;
}

</style>

</head>

<body>

<svg width="700" height="700" viewBox="0 0 700 700">

<!-- geometry circle -->

<circle cx="350" cy="350" r="260" stroke="gold" fill="none"/>

<!-- center chaos -->

<g class="node" onclick="selectEntity('CHAOS')">

<circle cx="350" cy="350" r="40" stroke="gold" fill="black"/>

<text x="350" y="350">CHAOS</text>

</g>

<!-- outer gods -->

<g class="node" onclick="selectEntity('ZEUS')">
<circle cx="350" cy="90" r="30" stroke="gold" fill="black"/>
<text x="350" y="90">ZEUS</text>
</g>

<g class="node" onclick="selectEntity('HERA')">
<circle cx="520" cy="160" r="30" stroke="gold" fill="black"/>
<text x="520" y="160">HERA</text>
</g>

<g class="node" onclick="selectEntity('ATHENA')">
<circle cx="610" cy="310" r="30" stroke="gold" fill="black"/>
<text x="610" y="310">ATHENA</text>
</g>

<g class="node" onclick="selectEntity('KRONOS')">
<circle cx="580" cy="470" r="30" stroke="gold" fill="black"/>
<text x="580" y="470">KRONOS</text>
</g>

<g class="node" onclick="selectEntity('DEMETER')">
<circle cx="470" cy="580" r="30" stroke="gold" fill="black"/>
<text x="470" y="580">DEMETER</text>
</g>

<g class="node" onclick="selectEntity('HADES')">
<circle cx="350" cy="610" r="30" stroke="gold" fill="black"/>
<text x="350" y="610">HADES</text>
</g>

<g class="node" onclick="selectEntity('ARTEMIS')">
<circle cx="230" cy="580" r="30" stroke="gold" fill="black"/>
<text x="230" y="580">ARTEMIS</text>
</g>

<g class="node" onclick="selectEntity('DIONYSUS')">
<circle cx="120" cy="470" r="30" stroke="gold" fill="black"/>
<text x="120" y="470">DIONYSUS</text>
</g>

<g class="node" onclick="selectEntity('ARES')">
<circle cx="90" cy="310" r="30" stroke="gold" fill="black"/>
<text x="90" y="310">ARES</text>
</g>

<g class="node" onclick="selectEntity('POSEIDON')">
<circle cx="180" cy="160" r="30" stroke="gold" fill="black"/>
<text x="180" y="160">POSEIDON</text>
</g>

<g class="node" onclick="selectEntity('APOLLO')">
<circle cx="260" cy="100" r="30" stroke="gold" fill="black"/>
<text x="260" y="100">APOLLO</text>
</g>

<g class="node" onclick="selectEntity('HERMES')">
<circle cx="440" cy="100" r="30" stroke="gold" fill="black"/>
<text x="440" y="100">HERMES</text>
</g>

</svg>

<script src="/static/script.js"></script>

</body>

</html>
