<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Pantheons</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
}

.node{
cursor:pointer;
}

text{
font-size:14px;
fill:white;
text-anchor:middle;
dominant-baseline:middle;
}

</style>

</head>

<body>

<svg width="700" height="700" viewBox="0 0 700 700">

<!-- Sacred geometry circle -->

<circle cx="350" cy="350" r="250" stroke="gold" stroke-width="1" fill="none"/>

<!-- center -->

<circle cx="350" cy="350" r="40" fill="black" stroke="gold"/>
<text x="350" y="350">DEVINES</text>

<!-- pantheon nodes -->

<g class="node" onclick="selectPantheon('greek')">
<circle cx="350" cy="100" r="35" stroke="gold" fill="black"/>
<text x="350" y="100">GREEK</text>
</g>

<g class="node" onclick="selectPantheon('egypt')">
<circle cx="560" cy="230" r="35" stroke="gold" fill="black"/>
<text x="560" y="230">EGYPT</text>
</g>

<g class="node" onclick="selectPantheon('chinese')">
<circle cx="560" cy="470" r="35" stroke="gold" fill="black"/>
<text x="560" y="470">CHINESE</text>
</g>

<g class="node" onclick="selectPantheon('vedic')">
<circle cx="350" cy="600" r="35" stroke="gold" fill="black"/>
<text x="350" y="600">VEDIC</text>
</g>

<g class="node" onclick="selectPantheon('sumerian')">
<circle cx="140" cy="470" r="35" stroke="gold" fill="black"/>
<text x="140" y="470">SUMER</text>
</g>

<g class="node" onclick="selectPantheon('nordic')">
<circle cx="140" cy="230" r="35" stroke="gold" fill="black"/>
<text x="140" y="230">NORDIC</text>
</g>

</svg>

<script src="/static/script.js"></script>

</body>
</html>
