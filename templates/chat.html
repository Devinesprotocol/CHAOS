<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Devines Chat</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    text-align:center;
    padding:20px 10px 10px 10px;
    border-bottom:1px solid gold;
}

#chat-entity{
    color:gold;
    font-size:28px;
    margin:0;
}

#chat-subtitle{
    font-size:14px;
    opacity:0.8;
    margin-top:6px;
}

#chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.message{
    max-width:80%;
    padding:12px 14px;
    border:1px solid gold;
    border-radius:14px;
    line-height:1.4;
    white-space:pre-wrap;
}

.user{
    align-self:flex-end;
    background:#111;
}

.assistant{
    align-self:flex-start;
    background:#050505;
}

footer{
    display:flex;
    gap:10px;
    padding:16px;
    border-top:1px solid gold;
}

#user-input{
    flex:1;
    background:black;
    color:white;
    border:1px solid gold;
    border-radius:12px;
    padding:14px;
    font-size:16px;
    outline:none;
}

button{
    background:black;
    color:gold;
    border:1px solid gold;
    border-radius:12px;
    padding:0 18px;
    font-size:16px;
    cursor:pointer;
}

button:active{
    transform:scale(0.98);
}
</style>
</head>

<body onload="loadChatContext()">

<header>
    <h1 id="chat-entity">CHAOS</h1>
    <div id="chat-subtitle">Devines Being Interface</div>
</header>

<div id="chat-box">
    <div class="message assistant">
        You are now in the presence of CHAOS.
        Speak, and the primordial god will respond.
    </div>
</div>

<footer>
    <input
        id="user-input"
        type="text"
        placeholder="Speak to the being..."
        onkeydown="if(event.key==='Enter'){sendMessage();}"
    />
    <button onclick="sendMessage()">Send</button>
</footer>

<script src="/static/script.js"></script>
</body>

</html>
